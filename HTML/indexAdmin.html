<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - GUNGO'S</title>
    <link rel="stylesheet" href="../CSS/styleAdmin.css">
</head>

<body>

    <header class="admin-header">
        <h1>Panel Admin</h1>
        <button id="btn-logout">Cerrar sesión</button>
    </header>

    <main class="admin-container">

        <section class="form-section">
            <h2>Agregar / Editar producto</h2>

            <form id="producto-form">

                <input type="hidden" id="producto-id">

                <label>Nombre</label>
                <input type="text" id="nombre" required>

                <label>Precio</label>
                <input type="number" id="precio" required>

                <label>Categoría</label>
                <input type="text" id="categoria" required>

                <label>URL de imagen</label>
                <input type="text" id="imagenUrl" required>

                <label class="checkbox-label">
                    <input type="checkbox" id="disponible" checked>
                    Disponible
                </label>

                <button type="submit">Guardar producto</button>

            </form>
        </section>

        <section class="productos-section">
            <h2>Productos cargados</h2>

            <input type="text" id="buscador-productos" class="buscador-productos" placeholder="Buscar producto...">

            <div id="productos-admin" class="productos-admin-grid">
                <!-- Productos desde Firestore -->
            </div>
        </section>

    </main>

    <script type="module" src="../JS/admin.js"></script>
</body>

</html>
