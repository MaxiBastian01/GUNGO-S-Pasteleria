<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - GUNGO'S</title>
    <link rel="stylesheet" href="../CSS/styleCarrito.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <header class="header">
        <a href="indexCliente.html" class="volver">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h1>Tu pedido</h1>
    </header>

    <main class="carrito-container">

        <section id="carrito-lista" class="carrito-lista">
            <!-- Productos del carrito -->
        </section>

        <section class="resumen">
            <h2>Resumen</h2>

            <div class="total-box">
                <span>Total</span>
                <strong id="total-carrito">$0</strong>
            </div>

            <button id="btn-whatsapp" class="btn-whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                Enviar pedido por WhatsApp
            </button>

            <button id="btn-vaciar" class="btn-vaciar">
                Vaciar carrito
            </button>
        </section>

    </main>

    <script src="../JS/carrito.js"></script>
</body>

</html>
